apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm3-serveur-backend-db
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm3-serveur-backend-db
    spec:
      domain:
        cpu:
          cores: 2
        resources:
          requests:
            memory: 2Gi
        devices:
          disks:
          - disk:
              bus: virtio
            name: disk-ubuntu
          - disk:
              bus: virtio
            name: disk-data-mysql
          - disk:
              bus: virtio
            name: cloudinitdisk
          interfaces:
          - name: lan
            bridge: {}
      networks:
      - name: lan
        multus:
          networkName: lan-network
      volumes:
      - name: disk-ubuntu
        dataVolume:
          name: dv-vm3-ubuntu
      - name: disk-data-mysql
        persistentVolumeClaim:
          claimName: pvc-vm3-mysql-data
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            hostname: vm3-serveur-backend-db
            users:
              - name: ubuntu
                sudo: ALL=(ALL) NOPASSWD:ALL
                shell: /bin/bash
            package_update: true
            package_upgrade: true
            packages:
              - mysql-server
            runcmd:
              - sed -i 's/bind-address.*/bind-address = 0.0.0.0/' /etc/mysql/mysql.conf.d/mysqld.cnf
              - systemctl restart mysql
              - mysql -e "CREATE DATABASE appdb;"
              - mysql -e "CREATE USER 'appuser'@'192.168.10.%' IDENTIFIED BY 'password123';"
              - mysql -e "GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'192.168.10.%';"
              - mysql -e "FLUSH PRIVILEGES;"
  dataVolumeTemplates:
  - metadata:
      name: dv-vm3-ubuntu
    spec:
      pvc:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 20Gi
      source:
        registry:
          url: "docker://quay.io/containerdisks/ubuntu:22.04"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-vm3-mysql-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
